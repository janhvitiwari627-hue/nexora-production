name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build (bun)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          mkdir -p build-logs
          set -o pipefail
          bun run build 2>&1 | tee build-logs/build.log

      - name: Capture TypeScript diagnostics on failure
        if: failure()
        run: |
          mkdir -p build-logs
          bunx tsgo --noEmit 2>&1 | tee build-logs/typecheck.log || true
          {
            echo "## Environment"
            echo "node: $(node -v 2>/dev/null || echo n/a)"
            echo "bun:  $(bun -v 2>/dev/null || echo n/a)"
            echo "commit: ${GITHUB_SHA}"
            echo "ref:    ${GITHUB_REF}"
          } > build-logs/env.txt

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}-${{ github.run_attempt }}
          path: build-logs/
          retention-days: 14
          if-no-files-found: warn

