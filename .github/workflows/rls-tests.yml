name: RLS Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: rls-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  rls:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run RLS tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RLS_LOG_DIR: ${{ github.workspace }}/rls-artifacts
        run: |
          mkdir -p "$RLS_LOG_DIR"
          set -o pipefail
          bun run test:rls 2>&1 | tee "$RLS_LOG_DIR/rls-output.log"

      - name: Upload RLS failure artifacts
        if: failure()
        id: upload_rls_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rls-test-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: rls-artifacts/
          if-no-files-found: warn
          retention-days: 14

      - name: Build PR comment summary
        if: failure() && github.event_name == 'pull_request'
        id: rls_summary
        run: node scripts/rls-pr-comment.mjs
        env:
          RLS_LOG_DIR: ${{ github.workspace }}/rls-artifacts
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RLS_ARTIFACT_NAME: rls-test-failure-${{ github.run_id }}-${{ github.run_attempt }}
          RLS_ARTIFACT_URL: ${{ steps.upload_rls_artifacts.outputs.artifact-url }}
          RLS_ARTIFACT_ID: ${{ steps.upload_rls_artifacts.outputs.artifact-id }}

      - name: Comment failing RLS summary on PR
        if: failure() && github.event_name == 'pull_request' && steps.rls_summary.outputs.body_path != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: rls-test-failure
          path: ${{ steps.rls_summary.outputs.body_path }}
