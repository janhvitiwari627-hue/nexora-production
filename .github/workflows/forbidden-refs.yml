name: Forbidden Reference Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run forbidden-reference scan
        run: bun run check:forbidden
